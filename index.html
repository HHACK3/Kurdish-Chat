<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Chat - چاتکردنی کوردی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-6 bg-gray-800 rounded-lg shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">Kurdish Chat</h1>
        
        <!-- Login Form -->
        <div id="loginForm" class="space-y-4">
            <h2 class="text-xl font-semibold text-center mb-4">چوونەژوورەوە</h2>
            
            <div>
                <label class="block text-sm font-medium mb-2">ئیمەیل</label>
                <input type="email" id="loginEmail" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ئیمەیلی خۆت بنووسە" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">تێپەڕەوشە</label>
                <input type="password" id="loginPassword" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="تێپەڕەوشە" required>
            </div>
            
            <button onclick="login()" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition">
                چوونەژوورەوە
            </button>
            
            <div class="text-center">
                <span class="text-gray-400">یان</span>
            </div>
            
            <button onclick="signInWithGoogle()" class="w-full py-2 bg-red-600 hover:bg-red-700 rounded-lg font-medium transition flex items-center justify-center">
                <svg class="w-5 h-5 ml-2" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                چوونەژوورەوە بە گوگڵ
            </button>
            
            <div class="text-center">
                <button onclick="showSignup()" class="text-blue-400 hover:text-blue-300">
                    هێشتا ئەکاونتت نییە؟ تۆمارکردن
                </button>
            </div>
        </div>
        
        <!-- Signup Form -->
        <div id="signupForm" class="space-y-4 hidden">
            <h2 class="text-xl font-semibold text-center mb-4">تۆمارکردن</h2>
            
            <div>
                <label class="block text-sm font-medium mb-2">ناوی تەواو</label>
                <input type="text" id="signupName" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ناوی تەواو" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">ناوی بەکارهێنەر</label>
                <input type="text" id="signupUsername" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ناوی بەکارهێنەر" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">ئیمەیل</label>
                <input type="email" id="signupEmail" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ئیمەیل" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">تێپەڕەوشە</label>
                <input type="password" id="signupPassword" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="تێپەڕەوشە" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">دووبارە تێپەڕەوشە</label>
                <input type="password" id="signupConfirmPassword" class="w-full px-3 py-2 bg-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="دووبارە تێپەڕەوشە" required>
            </div>
            
            <button onclick="signup()" class="w-full py-2 bg-green-600 hover:bg-green-700 rounded-lg font-medium transition">
                تۆمارکردن
            </button>
            
            <div class="text-center">
                <button onclick="showLogin()" class="text-blue-400 hover:text-blue-300">
                    ئەکاونتت هەیە؟ چوونەژوورەوە
                </button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden transition-all duration-300 transform translate-y-full">
        <span id="toastMessage"></span>
    </div>
    
    <script src="firebase-config-cdn.js"></script>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
</body>
</html>
